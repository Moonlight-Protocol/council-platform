app = 'moonlight-beta-council-platform'
primary_region = 'ams'

[build]

[env]
  PORT = '8080'
  MODE = 'production'
  LOG_LEVEL = 'INFO'

  # STELLAR
  NETWORK = 'testnet'
  NETWORK_FEE = '1000000000'
  CHANNEL_AUTH_ID = 'CAF7DFHTPSYIW5543WBXJODZCDI5WF5SSHBXGMPKFOYPFRDVWFDNBGX7'

  # COUNCIL ADMIN KEY
  # COUNCIL_SK=set in fly.io env secrets

  # OPEX
  OPEX_PUBLIC = 'GAKKWPIJFCWX4HFUBTKOBP2JLWIQTNBS5EYWEK4RLBXO37IWB5SSDZYX'
  # OPEX_SECRET=set in fly.io env secrets

  # SERVICE
  SERVICE_DOMAIN = 'moonlight-beta-council-platform.fly.dev'
  # SERVICE_AUTH_SECRET=set in fly.io env secrets

  # AUTH
  CHALLENGE_TTL = '900'
  SESSION_TTL = '21600'

[processes]
  app = 'deno task serve'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = "5s"
    timeout = "3s"
    grace_period = "60s"
    method = "GET"
    path = "/api/v1/health"

[deploy]
  strategy = "bluegreen"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
